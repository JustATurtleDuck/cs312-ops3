name: Build, Test, and Publish Minecraft Image

# tells pipeline to only run when version tag is pushed
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: obsidian-minecraft
          IMAGE_TAG: ${{ github.ref_name }} # Automatically uses your git tag name
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .

      - name: Smoke Test (Verify Startup)
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: obsidian-minecraft
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          # Boot the container in the background
          docker run -d --name mc-test -e EULA=TRUE -p 25565:25565 $REGISTRY/$REPOSITORY:$IMAGE_TAG
          
          echo "Waiting for server to initialize (Polling for 2 minutes)..."
          for i in $(seq 1 12); do
            sleep 10
            if docker logs mc-test 2>&1 | grep -q "Done"; then
              echo "Smoke test passed! Server initialized successfully."
              exit 0
            fi
          done
          
          echo "Smoke test failed or timed out."
          docker logs mc-test
          exit 1

      - name: Push Image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: obsidian-minecraft
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG